name: Deploy to EC2

# This workflow triggers when code is pushed to the 'main' branch
on:
  push:
    branches:
      - main

# Define variables we will use across jobs
env:
  DOCKER_IMAGE: sumit067hatekar/resumemaker-webapp

  CONTAINER_NAME: resumemaker-webapp

jobs:
  build-and-push:
    name: Build Docker Image and Push to Registry
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Get the code from the repository
      - name: Checkout Code
        uses: actions/checkout@v3

      # Step 2: Set up Java 17 (since your app uses Temurin 17)
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          
      # Step 3: Build the application JAR using Maven
      - name: Build with Maven
        run: mvn clean package -DskipTests
        working-directory: ./webapp

      # Step 4: Log in to Docker Hub (or any registry like AWS ECR)
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 5: Build the Docker image and push it to the registry
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          # Assuming the Dockerfile is inside the webapp directory
          context: ./webapp
          push: true
          tags: ${{ env.DOCKER_IMAGE }}:latest

  deploy:
    name: Deploy to Amazon EC2
    needs: build-and-push # Tell GitHub Actions to wait for the build to finish
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Execute commands on the remote EC2 instance using SSH
      - name: Deploy via SSH to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}             # e.g., 54.123.45.67
          username: ${{ secrets.EC2_USERNAME }}     # e.g., ubuntu or ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}           # Your .pem key contents
          script: |
            # 1. Stop the currently running container (if it exists)
            sudo docker stop ${{ env.CONTAINER_NAME }} || true
            sudo docker rm ${{ env.CONTAINER_NAME }} || true
            
            # 2. Pull the newest image from Docker Hub
            sudo docker pull ${{ env.DOCKER_IMAGE }}:latest
            
            # 3. Run the new container, exposing port 8080
            sudo docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              -p 8080:8080 \
              --restart unless-stopped \
              ${{ env.DOCKER_IMAGE }}:latest
            
            # 4. Clean up old unused images to save space on EC2
            sudo docker image prune -f
